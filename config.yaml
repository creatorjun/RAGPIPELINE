model:
  base_url: "http://0.0.0.0:8000/v1"
  api_key: "sk-no-key-required"
  model_name: "mlx-community/gemma-4-26B-A4B-it-OptiQ-4bit"
  max_tokens: 4096
  temperature: 0.1
  top_p: 0.9

pipeline:
  input_dir: ./as_is
  output_dir: ./to_be
  log_dir: ./logs
  max_chunk_tokens: 3000
  overlap_tokens: 200
  max_retries: 2
  keyword_retention_threshold: 0.7
  min_sections: 1
  min_doc_length: 200
  resume: false
  concurrency: 1

search:
  enabled: true
  base_url: "http://localhost:8080"
  timeout: 10
  max_results: 5

domains:
  - name: build
    output_folder: build
    keywords:
      - 구축
      - 설치
      - 배포
      - 설계
      - 환경
      - 인프라
      - 구성
  - name: maintenance
    output_folder: maintenance
    keywords:
      - 운영
      - 유지보수
      - 모니터링
      - 백업
      - 튜닝
      - 점검
      - 최적화
  - name: incident
    output_folder: incident
    keywords:
      - 장애
      - 에러
      - 복구
      - 롤백
      - RCA
      - 인시던트
      - 대응

glossary_path: ./glossary.yaml

rag:
  embedding_model: BAAI/bge-m3
  qdrant_path: ./qdrant_db
  collection_name: rag_docs
  chunk_size_h2: true
  top_k_dense: 10
  top_k_bm25: 10
  top_k_rerank: 5
  rrf_k: 60
  reranker_model: BAAI/bge-reranker-v2-m3
  answer_max_tokens: 2048
  bm25_index_path: ./qdrant_db/bm25_index.pkl
